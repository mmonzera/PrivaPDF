[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[[headers]]
  for = "/*"
  [headers.values]
    # Strict Content Security Policy for Privacy
    # connect-src 'none' ensures the app CANNOT send data to any server
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none'; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none';"
    
    # Standard Security Headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
